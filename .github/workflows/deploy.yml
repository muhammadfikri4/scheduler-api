name: Deploy to VM

on:
  push:
    branches:
      - dev
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: set-environment
    environment: ${{ needs.set-environment.outputs.environment }}
    env:
      SERVICE_NAME: "SCHEDULER API (${{ needs.set-environment.outputs.environment }})"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Commits
        id: commits
        run: |
          COMMITS=$(echo '${{ toJson(github.event.commits) }}' | jq -r '.[] | "• `\(.id[0:7])` \(.message)"' | head -10)
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Discord - Start
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "${{ env.SERVICE_NAME }}"
          embed-description: |
            **Pipeline Start**

            **Branch:** `${{ github.ref_name }}`
            **Changes:**
            ${{ steps.commits.outputs.list }}

            **Author:** ${{ github.event.head_commit.author.name }}
          embed-color: 16776960
          embed-url: ${{ github.event.head_commit.url }}

      - name: Deploy via SSH
        env:
          SERVER_DOMAIN: ${{ secrets.SERVER_DOMAIN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_LOGIN: ${{ secrets.SMTP_LOGIN }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          CRON_SCHEDULE: ${{ secrets.CRON_SCHEDULE }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          envs: SERVER_DOMAIN,SMTP_HOST,SMTP_PORT,SMTP_LOGIN,SMTP_PASSWORD,SMTP_USER,EMAIL_SENDER,CRON_SCHEDULE
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            APP_DIR="$HOME/app/scheduler-api"

            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR
              git fetch origin main
              git reset --hard origin/main
            else
              mkdir -p $HOME/app
              git clone https://github.com/${{ github.repository }}.git $APP_DIR
              cd $APP_DIR
            fi

            # Generate .env from GitHub Secrets
            cat > .env <<EOL
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_LOGIN=${SMTP_LOGIN}
            SMTP_PASSWORD=${SMTP_PASSWORD}
            SMTP_USER=${SMTP_USER}
            EMAIL_SENDER=${EMAIL_SENDER}
            CRON_SCHEDULE=${CRON_SCHEDULE}
            EOL

            # Install & build
            rm -rf dist tsconfig.tsbuildinfo
            pnpm install
            pnpm build

            # Generate nginx config from template
            export SERVER_DOMAIN="${SERVER_DOMAIN}"
            envsubst '${SERVER_DOMAIN}' < nginx.conf > /tmp/nestjs-scheduler-email.conf
            sudo cp /tmp/nestjs-scheduler-email.conf /etc/nginx/sites-available/nestjs-scheduler-email
            sudo ln -sf /etc/nginx/sites-available/nestjs-scheduler-email /etc/nginx/sites-enabled/
            sudo nginx -t && sudo systemctl reload nginx

            # Stop, delete, and start fresh with PM2 to ensure correct script path
            pm2 delete scheduler-api 2>/dev/null || true
            pm2 start dist/main.js --name scheduler-api
            pm2 save

      - name: Notify Discord - Success
        if: success()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "${{ env.SERVICE_NAME }}"
          embed-description: |
            **Pipeline Success**

            **Branch:** `${{ github.ref_name }}`
            **Changes:**
            ${{ steps.commits.outputs.list }}

            **Author:** ${{ github.event.head_commit.author.name }}
          embed-color: 3066993
          embed-url: ${{ github.event.head_commit.url }}

      - name: Notify Discord - Failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          embed-title: "${{ env.SERVICE_NAME }}"
          embed-description: |
            **Pipeline Failed**

            **Branch:** `${{ github.ref_name }}`
            **Changes:**
            ${{ steps.commits.outputs.list }}

            **Author:** ${{ github.event.head_commit.author.name }}
          embed-color: 15158332
          embed-url: ${{ github.event.head_commit.url }}
